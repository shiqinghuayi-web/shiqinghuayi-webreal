<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾情畫憶｜註冊</title>
  <link rel="icon" href="/assets/images/111.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header hero-header">
    <div class="header-wrap header-full">
      <a class="brand logo-brand" href="/index.html">
        <img src="/assets/images/piyan2.png" alt="拾情話憶 Logo">
      </a>

      <nav class="main-nav">
        <a href="/index.html" class="active">首頁</a>
        <a href="/products.html">商品</a>
        <a href="/cart.html">購物車 <span id="cart-count" class="cart-badge">0</span></a>
        <a href="/login.html">登入</a>
        <a href="/account.html">會員中心</a>
      </nav>
    </div>
  </header>
  <main class="auth-layout">
    <section class="auth-card">
      <div class="auth-side">
        <span class="eyebrow">Create Account</span>
        <h1>加入拾情畫憶</h1>
        <p>建立帳號後，就能用同一套高質感體驗完成收藏、購物與訂單追蹤。</p>
        <div class="auth-benefits">
          <div>快速結帳與保存收件資料</div>
          <div>查看訂單紀錄與付款狀態</div>
          <div>後續可擴充社群登入功能</div>
        </div>
      </div>
      <div class="auth-panel">
        <form id="register-form" class="auth-form">
          <span class="section-label">Create Profile</span>
          <h2 style="margin:0;font-family:var(--font-display);font-size:46px;color:var(--primary-strong)">建立會員</h2>
          <input class="input" type="text" name="name" placeholder="姓名" required />
          <input class="input" type="email" name="email" placeholder="Email" required />
          <input class="input" type="password" name="password" placeholder="密碼" required />
    <div class="form-group">
    <input type="password" id="reg-password" placeholder="請輸入密碼 (8位以上)" required>
    <!-- 強度顯示條 -->
    <div id="strength-container" style="margin: 8px 0; display: none;">
        <div id="strength-bar" style="height: 4px; border-radius: 2px; transition: 0.4s; width: 0%;"></div>
        <small id="strength-text" style="font-size: 12px; margin-top: 4px; display: block;"></small>
    </div>
</div>
          <input class="input" type="password" name="confirmPassword" placeholder="確認密碼" required />
          <div id="password-error" style="color: #d9534f; font-size: 14px; margin-top: -10px; margin-bottom: 10px; display: none;">
  密碼不相符
</div>
          <button class="btn full" type="submit">建立帳號</button>
          <p class="form-tip">已經有帳號？<a href="/login.html">前往登入</a></p>
        </form>
      </div>
    </section>
  </main>
  <script src="/js/register.js"></script>
</body>
</html>
